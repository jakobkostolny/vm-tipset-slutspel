<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VM 2026 – Slutspelshjulet</title>
<style>
  :root{
    --bg:#0b0b0d;
    --panel:#15151a;
    --panel2:#1c1c22;
    --gold:#d4af37;
    --gold-soft:#f1d27a;
    --line:#46464e;
    --text:#eee;
    --muted:#9a9a9f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:radial-gradient(circle at 50% 35%, #1a1610 0%, #0b0b0d 60%);
    color:var(--text);
    font-family:"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    min-height:100vh;
  }
  header{ text-align:center; padding:24px 16px 10px; }
  header h1{
    margin:0; font-size:1.4rem; letter-spacing:1px;
    color:var(--gold-soft); text-shadow:0 0 18px rgba(212,175,55,.35);
  }
  header p{ margin:6px 0 0; color:var(--muted); font-size:.82rem; }

  .champion-banner{
    display:none; max-width:420px; margin:14px auto 0; text-align:center;
    background:linear-gradient(135deg,#2a2310,#1a1610);
    border:1px solid var(--gold); border-radius:14px; padding:12px 18px;
    box-shadow:0 0 30px rgba(212,175,55,.25);
  }
  .champion-banner.show{ display:block; }
  .champion-banner .label{ font-size:.7rem; letter-spacing:2px; color:var(--muted); text-transform:uppercase; }
  .champion-banner .name{ font-size:1.3rem; color:var(--gold-soft); font-weight:700; margin-top:2px; display:flex; align-items:center; justify-content:center; gap:8px; }
  .champion-banner img{ width:26px; border-radius:3px; box-shadow:0 0 6px rgba(0,0,0,.6); }

  .toolbar{ display:flex; justify-content:center; gap:10px; margin:14px 0; flex-wrap:wrap; }
  button.action{
    background:var(--panel2); color:var(--text); border:1px solid var(--line);
    border-radius:8px; padding:8px 14px; font-size:.82rem; cursor:pointer;
  }
  button.action:hover{ border-color:var(--gold); color:var(--gold-soft); }

  .wheel-wrap{ overflow:auto; padding:10px; -webkit-overflow-scrolling:touch; }
  .wheel-inner{ width:max-content; margin:0 auto; }
  svg{ display:block; }
  .team-icon{ cursor:pointer; }

  .hint{ text-align:center; color:var(--muted); font-size:.78rem; margin:-4px 0 8px; }

  .score-section{ max-width:680px; margin:10px auto 50px; padding:0 14px; }
  .score-section h2{
    font-size:.85rem; letter-spacing:1.5px; text-transform:uppercase;
    color:var(--muted); border-bottom:1px solid var(--line); padding-bottom:6px; margin:26px 0 10px;
  }
  .score-row{
    background:var(--panel); border:1px solid var(--line); border-radius:10px;
    padding:8px 10px; margin-bottom:8px; font-size:.85rem;
  }
  .score-row.pending{ opacity:.4; }
  .score-row .row-main{ display:flex; align-items:center; gap:8px; }
  .score-row .side{ display:flex; align-items:center; gap:6px; flex:1; min-width:0; cursor:default; }
  .score-row .side.clickable{ cursor:pointer; }
  .score-row .side.right{ justify-content:flex-end; }
  .score-row .side img{ width:22px; height:16px; object-fit:cover; border-radius:2px; flex-shrink:0; box-shadow:0 0 0 1px rgba(255,255,255,.08); }
  .score-row .nm{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .score-row .nm.winner{ color:var(--gold-soft); font-weight:700; }
  .score-row input{
    width:34px; text-align:center; background:#0e0e11; border:1px solid var(--line);
    color:var(--text); border-radius:5px; font-size:.9rem; padding:5px 0;
  }
  .score-row input:focus{ outline:none; border-color:var(--gold); }
  .score-row .vs{ color:var(--muted); font-size:.7rem; padding:0 4px; }
  .tie-note{
    margin-top:6px; font-size:.72rem; color:var(--gold-soft); text-align:center;
  }

  footer{ text-align:center; color:var(--muted); font-size:.75rem; padding:6px 16px 36px; }
</style>
</head>
<body>

<header>
  <h1>🏆 VM 2026 – Slutspelshjulet</h1>
  <p>Fyll i resultatet efter fulltid. Blir det lika får du klicka på laget som gick vidare (t.ex. efter straffar).</p>
</header>

<div class="champion-banner" id="championBanner">
  <div class="label">Världsmästare</div>
  <div class="name" id="championName"></div>
</div>

<div class="toolbar">
  <button class="action" id="resetBtn">↺ Nollställ allt</button>
  <button class="action" id="shareBtn">🔗 Kopiera länk med mina tips</button>
</div>

<p class="hint">Hjulet går att panorera/zooma om det inte ryms på skärmen.</p>

<div class="wheel-wrap">
  <div class="wheel-inner" id="wheelInner"></div>
</div>

<div class="score-section" id="scoreSection"></div>

<footer>Inofficiellt fantipp-schema · VM 2026</footer>

<script>
/* ====================== LAGDATA (landskod = ISO för flagga) ====================== */
const pairs = [
  [{n:"Sverige",c:"se"}, {n:"Frankrike",c:"fr"}],
  [{n:"Paraguay",c:"py"}, {n:"Tyskland",c:"de"}],
  [{n:"Brasilien",c:"br"}, {n:"Japan",c:"jp"}],
  [{n:"Elfenbenskusten",c:"ci"}, {n:"Norge",c:"no"}],
  [{n:"Mexiko",c:"mx"}, {n:"Ecuador",c:"ec"}],
  [{n:"England",c:"gb-eng"}, {n:"DR Kongo",c:"cd"}],
  [{n:"Argentina",c:"ar"}, {n:"Kap Verde",c:"cv"}],
  [{n:"Australien",c:"au"}, {n:"Egypten",c:"eg"}],
  [{n:"Schweiz",c:"ch"}, {n:"Algeriet",c:"dz"}],
  [{n:"Colombia",c:"co"}, {n:"Ghana",c:"gh"}],
  [{n:"Senegal",c:"sn"}, {n:"Belgien",c:"be"}],
  [{n:"Bosnien och Herzegovina",c:"ba"}, {n:"USA",c:"us"}],
  [{n:"Österrike",c:"at"}, {n:"Spanien",c:"es"}],
  [{n:"Kroatien",c:"hr"}, {n:"Portugal",c:"pt"}],
  [{n:"Marocko",c:"ma"}, {n:"Nederländerna",c:"nl"}],
  [{n:"Kanada",c:"ca"}, {n:"Sydafrika",c:"za"}]
];
const roundNames = ["Åttondelsfinal","16-delsfinal","Kvartsfinal","Semifinal","Final"];
function flagUrl(code, w){ return `https://flagcdn.com/w${w||80}/${code}.png`; }

/* ====================== DATAMODELL ====================== */
let matches = [];

function buildEmptyBracket(){
  matches = [];
  pairs.forEach((p, i)=>{
    matches.push({id:`r0m${i}`, round:0, idx:i, teamA:p[0], teamB:p[1], scoreA:"", scoreB:"", winner:null});
  });
  let counts = [8,4,2,1];
  for(let r=1; r<=4; r++){
    for(let i=0;i<counts[r-1];i++){
      matches.push({id:`r${r}m${i}`, round:r, idx:i, teamA:null, teamB:null, scoreA:"", scoreB:"", winner:null});
    }
  }
}
function getMatch(id){ return matches.find(m=>m.id===id); }
function nextInfo(m){
  if(m.round===4) return null;
  const nextRound = m.round+1;
  const nextIdx = Math.floor(m.idx/2);
  const slot = m.idx % 2 === 0 ? "A" : "B";
  return {id:`r${nextRound}m${nextIdx}`, slot};
}
function clearDownstream(matchId){
  const m = getMatch(matchId);
  if(!m) return;
  const info = nextInfo(m);
  if(!info) return;
  const next = getMatch(info.id);
  if(!next) return;
  if(info.slot==="A"){ next.teamA = null; } else { next.teamB = null; }
  next.winner = null; next.scoreA=""; next.scoreB="";
  clearDownstream(info.id);
}

/* Sätter/uppdaterar vinnare i en match och skickar laget vidare i trädet */
function setMatchWinner(matchId, slot){
  const m = getMatch(matchId);
  const team = slot==="A" ? m.teamA : m.teamB;
  if(!team) return;
  if(m.winner===slot) return;
  m.winner = slot;
  const info = nextInfo(m);
  if(info){
    const next = getMatch(info.id);
    if(info.slot==="A") next.teamA = team; else next.teamB = team;
  }
  clearDownstream(matchId);
}
function clearMatchWinner(matchId){
  const m = getMatch(matchId);
  if(m.winner===null){ return; }
  m.winner = null;
  clearDownstream(matchId);
}

/* Manuellt klick (val vid lika resultat, eller överstyrning) */
function selectWinner(matchId, slot){
  setMatchWinner(matchId, slot);
  save(); render();
}

/* Skriver in resultatsiffra -> avgör automatiskt vinnare om det inte är lika */
function setScore(matchId, slot, value){
  const m = getMatch(matchId);
  if(slot==="A") m.scoreA = value; else m.scoreB = value;

  const aNum = m.scoreA===""? null : Number(m.scoreA);
  const bNum = m.scoreB===""? null : Number(m.scoreB);

  if(aNum!==null && bNum!==null && !isNaN(aNum) && !isNaN(bNum)){
    if(aNum > bNum) setMatchWinner(matchId, "A");
    else if(bNum > aNum) setMatchWinner(matchId, "B");
    else clearMatchWinner(matchId); // lika -> kräver manuellt val
  }
  save(); render();
}

/* ====================== GEOMETRI FÖR HJULET ====================== */
const SIZE = 820;
const CX = SIZE/2, CY = SIZE/2;
const STEP = 360/32;

function leafAngle(i){ return i*STEP; }
const angleCache = {};
function matchAngle(round, idx){
  const key = round+"_"+idx;
  if(angleCache[key]!==undefined) return angleCache[key];
  let a;
  if(round===0) a = (leafAngle(2*idx) + leafAngle(2*idx+1))/2;
  else a = (matchAngle(round-1,2*idx) + matchAngle(round-1,2*idx+1))/2;
  angleCache[key]=a;
  return a;
}
function teamAngle(round, idx, slot){
  if(round===0) return leafAngle(2*idx+slot);
  return matchAngle(round-1, 2*idx+slot);
}
function polar(r, deg){
  const rad = (deg-90) * Math.PI/180;
  return { x: CX + r*Math.cos(rad), y: CY + r*Math.sin(rad) };
}

const leafR  = [372, 322, 268, 214, 160];
const nodeR  = [322, 268, 214, 160, 92];
const arcR   = leafR.map((lr,i)=> lr - (lr-nodeR[i])*0.45);
const iconR  = [15, 14, 12.5, 11, 10];

/* ====================== RENDER: SVG-HJUL ====================== */
function svgArc(p1, p2, r){
  return `M ${p1.x.toFixed(1)},${p1.y.toFixed(1)} A ${r.toFixed(1)},${r.toFixed(1)} 0 0,1 ${p2.x.toFixed(1)},${p2.y.toFixed(1)}`;
}

function renderWheel(){
  let svgParts = [];
  svgParts.push(`<defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3a2f12" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0b0b0d" stop-opacity="0"/>
    </radialGradient>
    ${iconR.map((r,i)=>`<clipPath id="clipRound${i}"><circle cx="0" cy="0" r="${r}"/></clipPath>`).join("")}
    <clipPath id="clipChamp"><circle cx="0" cy="0" r="20"/></clipPath>
  </defs>`);

  for(let r=0; r<=4; r++){
    const roundMatches = matches.filter(m=>m.round===r);
    roundMatches.forEach(m=>{
      const angA = teamAngle(r, m.idx, 0);
      const angB = teamAngle(r, m.idx, 1);
      const mid = (angA+angB)/2;
      const pA = polar(leafR[r], angA);
      const pB = polar(leafR[r], angB);
      const arcA = polar(arcR[r], angA);
      const arcB = polar(arcR[r], angB);
      const arcMid = polar(arcR[r], mid);
      const nodePt = polar(nodeR[r], mid);

      const decided = !!m.winner;
      const lineColor = decided ? "var(--gold)" : "var(--line)";
      const lineWidth = decided ? 2 : 1.3;

      svgParts.push(`<g class="connector">
        <line x1="${pA.x.toFixed(1)}" y1="${pA.y.toFixed(1)}" x2="${arcA.x.toFixed(1)}" y2="${arcA.y.toFixed(1)}" stroke="${lineColor}" stroke-width="${lineWidth}"/>
        <line x1="${pB.x.toFixed(1)}" y1="${pB.y.toFixed(1)}" x2="${arcB.x.toFixed(1)}" y2="${arcB.y.toFixed(1)}" stroke="${lineColor}" stroke-width="${lineWidth}"/>
        <path d="${svgArc(arcA,arcB,arcR[r])}" fill="none" stroke="${lineColor}" stroke-width="${lineWidth}"/>
        <line x1="${arcMid.x.toFixed(1)}" y1="${arcMid.y.toFixed(1)}" x2="${nodePt.x.toFixed(1)}" y2="${nodePt.y.toFixed(1)}" stroke="${lineColor}" stroke-width="${lineWidth}"/>
        <circle cx="${arcA.x.toFixed(1)}" cy="${arcA.y.toFixed(1)}" r="2.2" fill="${lineColor}"/>
        <circle cx="${arcB.x.toFixed(1)}" cy="${arcB.y.toFixed(1)}" r="2.2" fill="${lineColor}"/>
        <circle cx="${nodePt.x.toFixed(1)}" cy="${nodePt.y.toFixed(1)}" r="2.4" fill="${lineColor}"/>
      </g>`);

      svgParts.push(teamIconSVG(m, "A", pA, iconR[r], r));
      svgParts.push(teamIconSVG(m, "B", pB, iconR[r], r));

      if(r===4 && m.winner){
        const champ = m.winner==="A" ? m.teamA : m.teamB;
        svgParts.push(championIconSVG(champ, nodePt));
      }
    });
  }

  svgParts.push(`<circle cx="${CX}" cy="${CY}" r="78" fill="url(#glow)"/>`);
  svgParts.push(`<text x="${CX}" y="${CY+14}" text-anchor="middle" font-size="34">🏆</text>`);

  const svg = `<svg width="${SIZE}" height="${SIZE}" viewBox="0 0 ${SIZE} ${SIZE}" xmlns="http://www.w3.org/2000/svg">${svgParts.join("")}</svg>`;
  document.getElementById("wheelInner").innerHTML = svg;

  document.querySelectorAll(".team-icon[data-match]").forEach(el=>{
    el.addEventListener("click", ()=> selectWinner(el.dataset.match, el.dataset.slot));
  });
}

function teamIconSVG(m, slot, pt, r, roundIdx){
  const team = slot==="A" ? m.teamA : m.teamB;
  if(!team){
    return `<circle cx="${pt.x.toFixed(1)}" cy="${pt.y.toFixed(1)}" r="${(r*0.5).toFixed(1)}" fill="#222226" stroke="var(--line)" stroke-width="1"/>`;
  }
  const isWinner = m.winner===slot;
  const isLoser = m.winner && m.winner!==slot;
  const ringColor = isWinner ? "var(--gold)" : (isLoser ? "#444" : "#555");
  const ringWidth = isWinner ? 2.6 : 1.2;
  const opacity = isLoser ? 0.4 : 1;
  return `<g class="team-icon" data-match="${m.id}" data-slot="${slot}" opacity="${opacity}" transform="translate(${pt.x.toFixed(1)},${pt.y.toFixed(1)})">
      <title>${team.n}</title>
      <circle r="${r}" fill="#1c1c22" stroke="${ringColor}" stroke-width="${ringWidth}"/>
      <image href="${flagUrl(team.c,80)}" x="${-r}" y="${-r}" width="${2*r}" height="${2*r}" clip-path="url(#clipRound${roundIdx})" preserveAspectRatio="xMidYMid slice"/>
    </g>`;
}
function championIconSVG(team, pt){
  return `<g transform="translate(${pt.x.toFixed(1)},${pt.y.toFixed(1)})">
      <circle r="20" fill="#2a2310" stroke="var(--gold)" stroke-width="3"/>
      <image href="${flagUrl(team.c,80)}" x="-20" y="-20" width="40" height="40" clip-path="url(#clipChamp)" preserveAspectRatio="xMidYMid slice"/>
    </g>`;
}

/* ====================== RENDER: RESULTATLISTA ====================== */
function flagImg(team){
  if(!team) return "";
  return `<img src="${flagUrl(team.c,40)}" alt="${team.n}"/>`;
}

function renderScoreList(){
  const el = document.getElementById("scoreSection");
  let html = "";
  for(let r=0; r<=4; r++){
    html += `<h2>${roundNames[r]}</h2>`;
    matches.filter(m=>m.round===r).forEach(m=>{
      const ready = m.teamA && m.teamB;
      const rowClass = "score-row" + (ready ? "" : " pending");
      const winA = m.winner==="A" ? "winner":"";
      const winB = m.winner==="B" ? "winner":"";
      const aNum = m.scoreA===""? null : Number(m.scoreA);
      const bNum = m.scoreB===""? null : Number(m.scoreB);
      const isTie = ready && aNum!==null && bNum!==null && !isNaN(aNum) && !isNaN(bNum) && aNum===bNum && !m.winner;

      html += `<div class="${rowClass}">
        <div class="row-main">
          <div class="side ${ready?'clickable':''}" data-click="${ready?`${m.id}|A`:''}">
            ${ready ? flagImg(m.teamA) : ""}
            <span class="nm ${winA}">${ready ? m.teamA.n : "Väntar…"}</span>
          </div>
          <input type="number" min="0" max="20" inputmode="numeric" data-score="${m.id}|A" value="${m.scoreA}" ${ready?'':'disabled'} placeholder="-"/>
          <span class="vs">–</span>
          <input type="number" min="0" max="20" inputmode="numeric" data-score="${m.id}|B" value="${m.scoreB}" ${ready?'':'disabled'} placeholder="-"/>
          <div class="side right ${ready?'clickable':''}" data-click="${ready?`${m.id}|B`:''}">
            <span class="nm ${winB}">${ready ? m.teamB.n : "Väntar…"}</span>
            ${ready ? flagImg(m.teamB) : ""}
          </div>
        </div>
        ${isTie ? `<div class="tie-note">⚖️ Lika resultat – klicka på laget som gick vidare</div>` : ""}
      </div>`;
    });
  }
  el.innerHTML = html;

  el.querySelectorAll("input[data-score]").forEach(inp=>{
    inp.addEventListener("input", ()=>{
      const [id,slot] = inp.dataset.score.split("|");
      setScore(id, slot, inp.value);
    });
  });
  el.querySelectorAll(".side[data-click]").forEach(div=>{
    if(!div.dataset.click) return;
    div.addEventListener("click", ()=>{
      const [id,slot] = div.dataset.click.split("|");
      selectWinner(id, slot);
    });
  });
}

/* ====================== CHAMPION-BANNER ====================== */
function renderChampionBanner(){
  const final = getMatch("r4m0");
  const banner = document.getElementById("championBanner");
  const nameEl = document.getElementById("championName");
  if(final && final.winner){
    const champ = final.winner==="A" ? final.teamA : final.teamB;
    nameEl.innerHTML = `${flagImg(champ)} ${champ.n}`;
    banner.classList.add("show");
  } else {
    banner.classList.remove("show");
  }
}

function render(){
  renderWheel();
  renderScoreList();
  renderChampionBanner();
}

/* ====================== SPARA / DELA ====================== */
const STORAGE_KEY = "vm2026-bracket-wheel-v2";
function save(){ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(matches)); }catch(e){} }
function load(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const parsed = JSON.parse(raw);
      if(Array.isArray(parsed) && parsed.length === matches.length){ matches = parsed; return true; }
    }
  }catch(e){}
  return false;
}
function encodeState(){
  const compact = matches.map(m=> (m.winner==="A"?"A":m.winner==="B"?"B":"-") + "|" + (m.scoreA||"") + "|" + (m.scoreB||"")).join(";");
  return encodeURIComponent(btoa(unescape(encodeURIComponent(compact))));
}
function replaySelect(id, slot){
  const m = getMatch(id);
  const team = slot==="A"?m.teamA:m.teamB;
  if(!team) return;
  m.winner = slot;
  const info = nextInfo(m);
  if(info){
    const next = getMatch(info.id);
    if(info.slot==="A") next.teamA = team; else next.teamB = team;
  }
}
function decodeState(str){
  try{
    const compact = decodeURIComponent(escape(atob(decodeURIComponent(str))));
    const parts = compact.split(";");
    if(parts.length !== matches.length) return false;
    parts.forEach((p,i)=>{
      const [w,sa,sb] = p.split("|");
      matches[i].scoreA = sa||""; matches[i].scoreB = sb||"";
      if(w==="A") replaySelect(matches[i].id,"A");
      else if(w==="B") replaySelect(matches[i].id,"B");
    });
    return true;
  }catch(e){ return false; }
}

document.getElementById("shareBtn").addEventListener("click", ()=>{
  const url = location.origin + location.pathname + "#t=" + encodeState();
  navigator.clipboard.writeText(url).then(()=>{
    alert("Länk med dina tips kopierad! Skicka den till en kompis.");
  }).catch(()=>{
    prompt("Kopiera länken manuellt:", url);
  });
});
document.getElementById("resetBtn").addEventListener("click", ()=>{
  if(confirm("Nollställa hela schemat?")){
    buildEmptyBracket();
    save();
    history.replaceState(null,"",location.pathname);
    render();
  }
});

/* ====================== INIT ====================== */
buildEmptyBracket();
const hash = location.hash;
if(hash.startsWith("#t=")){
  decodeState(hash.slice(3));
  save();
} else {
  load();
}
render();
</script>
</body>
</html>
